<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPace — Study Preferences (Step 4 of 8)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-3);
    }
    .section-header__note {
      font-size: var(--text-xs);
      color: var(--color-gray-500);
      font-style: italic;
      font-weight: 400;
    }
    .section-block {
      margin-bottom: var(--space-8);
    }
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
    }
    .skip-link {
      display: inline-block;
      margin-top: var(--space-4);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-gray-500);
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.15s;
    }
    .skip-link:hover {
      color: var(--color-black);
    }
    .form-label {
      font-family: var(--font-heading);
    }
  </style>
</head>
<body>
  <div class="onboarding">

    <!-- Nav bar -->
    <nav class="nav" style="justify-content:center;">
      <a href="index.html" class="nav__logo">MyPace</a>
    </nav>

    <!-- Onboarding Header: Back + Steps -->
    <div class="onboarding__header">
      <a href="onboarding-3.html" class="onboarding__back" aria-label="Go back">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 4L6 9L11 14" stroke="#111111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <div class="steps">
        <span class="steps__dot steps__dot--completed"></span>
        <span class="steps__dot steps__dot--completed"></span>
        <span class="steps__dot steps__dot--completed"></span>
        <span class="steps__dot steps__dot--active"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__label">Step 4 of 8</span>
      </div>
      <div style="width: 36px;"></div>
    </div>

    <!-- Body -->
    <main class="onboarding__body">

      <!-- Heading -->
      <div class="text-center mb-8 w-full" style="max-width: 580px;">
        <h1 class="text-3xl font-bold" style="margin-bottom: var(--space-3);">Study Preferences</h1>
        <p class="text-gray" style="font-size: var(--text-base); line-height: 1.6;">
          Tell us when and how you like to study so we can build your ideal schedule.
        </p>
      </div>

      <!-- Form sections -->
      <div class="w-full" style="max-width: 580px;">

        <!-- Preferred Study Times -->
        <div class="section-block">
          <div class="section-header">
            <label class="form-label" style="margin-bottom: 0;">Preferred Study Times</label>
            <span class="section-header__note">Select all that apply</span>
          </div>
          <div class="chips-wrap">
            <button class="chip chip--active" type="button">
              <span class="chip__dot"></span>
              Morning
            </button>
            <button class="chip" type="button">Afternoon</button>
            <button class="chip chip--active" type="button">
              <span class="chip__dot"></span>
              Evening
            </button>
            <button class="chip" type="button">Late Night</button>
          </div>
        </div>

        <!-- Study Session Length -->
        <div class="section-block">
          <label class="form-label">Study Session Length</label>
          <div class="toggle-group">
            <button class="toggle-group__item" type="button">25 min</button>
            <button class="toggle-group__item toggle-group__item--active" type="button">45 min</button>
            <button class="toggle-group__item" type="button">1 hour</button>
            <button class="toggle-group__item" type="button">2 hours</button>
          </div>
        </div>

        <!-- Break Preference -->
        <div class="section-block">
          <label class="form-label">Break Preference</label>
          <div class="toggle-group">
            <button class="toggle-group__item" type="button">5 min</button>
            <button class="toggle-group__item toggle-group__item--active" type="button">10 min</button>
            <button class="toggle-group__item" type="button">15 min</button>
          </div>
        </div>

        <!-- Next Step button -->
        <a href="onboarding-5.html" class="btn btn--primary btn--large btn--full mt-4">
          Next Step &rarr;
        </a>


      </div>
    </main>

  </div>
  <script>
    // Multi-select chips
    document.querySelectorAll('.chips-wrap .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const isActive = chip.classList.contains('chip--active');
        if (isActive) {
          chip.classList.remove('chip--active');
          const dot = chip.querySelector('.chip__dot');
          if (dot) dot.remove();
        } else {
          chip.classList.add('chip--active');
          const dot = document.createElement('span');
          dot.className = 'chip__dot';
          chip.prepend(dot);
        }
      });
    });

    // Single-select toggle groups
    document.querySelectorAll('.toggle-group').forEach(group => {
      group.querySelectorAll('.toggle-group__item').forEach(item => {
        item.addEventListener('click', () => {
          group.querySelectorAll('.toggle-group__item').forEach(i => i.classList.remove('toggle-group__item--active'));
          item.classList.add('toggle-group__item--active');
        });
      });
    });
  </script>
</body>
</html>
