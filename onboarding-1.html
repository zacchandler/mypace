<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPace — Step 1 of 8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .hero-illustration {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: center;
    }

    .hero-illustration svg {
      width: 100%;
      max-width: 480px;
      height: auto;
    }

    .onboarding__link {
      font-size: var(--text-sm);
      color: var(--color-gray-500);
      font-weight: 500;
      transition: color 0.15s;
    }

    .onboarding__link:hover {
      color: var(--color-black);
    }

    .onboarding__link--underline {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      padding: var(--space-6) var(--space-8);
      border-top: 1px solid var(--color-gray-100);
    }

    .footer__text {
      font-size: var(--text-xs);
      color: var(--color-gray-400);
    }

    .footer__version {
      font-size: 10px;
      color: var(--color-gray-300);
      margin-top: var(--space-1);
    }
  </style>
</head>
<body>
  <div class="onboarding">

    <!-- Nav Bar -->
    <nav class="nav" style="justify-content:center;">
      <a href="index.html" class="nav__logo">MyPace</a>
    </nav>

    <!-- Step Indicator -->
    <div class="onboarding__header" style="justify-content:center;">
      <div class="steps">
        <span class="steps__dot steps__dot--active"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__dot"></span>
        <span class="steps__label">Step 1 of 8</span>
      </div>
    </div>

    <!-- Main Content -->
    <main class="onboarding__body" style="padding-top: var(--space-8);">

      <!-- Heading -->
      <h1 class="text-4xl font-bold text-center" style="line-height: 1.2; letter-spacing: -0.02em; max-width: 580px;">
        Empower your academic journey with MyPace.
      </h1>

      <!-- Hero Illustration — Student with study tools -->
      <div class="hero-illustration mt-8">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
          <!-- Background shapes -->
          <rect x="40" y="60" width="400" height="220" rx="20" fill="#EBF3FC" opacity="0.6"/>
          <circle cx="380" cy="80" r="40" fill="#6FCF97" opacity="0.12"/>
          <circle cx="100" cy="240" r="30" fill="#3A0CA3" opacity="0.08"/>

          <!-- Desk -->
          <rect x="80" y="210" width="320" height="8" rx="4" fill="#4A90E2" opacity="0.15"/>

          <!-- Laptop -->
          <rect x="160" y="130" width="160" height="80" rx="8" fill="#fff" stroke="#4A90E2" stroke-width="2"/>
          <!-- Laptop screen content -->
          <rect x="172" y="142" width="50" height="6" rx="3" fill="#4A90E2" opacity="0.6"/>
          <rect x="172" y="154" width="80" height="4" rx="2" fill="#E0E0E0"/>
          <rect x="172" y="163" width="65" height="4" rx="2" fill="#E0E0E0"/>
          <!-- Mini chart on screen -->
          <rect x="260" y="162" width="8" height="16" rx="2" fill="#6FCF97" opacity="0.7"/>
          <rect x="272" y="155" width="8" height="23" rx="2" fill="#4A90E2" opacity="0.7"/>
          <rect x="284" y="148" width="8" height="30" rx="2" fill="#3A0CA3" opacity="0.5"/>
          <rect x="296" y="158" width="8" height="20" rx="2" fill="#6FCF97" opacity="0.7"/>
          <!-- Laptop checkmarks -->
          <circle cx="180" cy="188" r="5" fill="#6FCF97" opacity="0.25"/>
          <path d="M177.5 188 L179 189.5 L182.5 186" stroke="#6FCF97" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="190" y="185" width="40" height="4" rx="2" fill="#E0E0E0"/>
          <circle cx="180" cy="199" r="5" fill="#4A90E2" opacity="0.15"/>
          <rect x="190" y="197" width="30" height="4" rx="2" fill="#E0E0E0"/>
          <!-- Laptop base -->
          <path d="M150 210 L170 210 L168 215 L152 215 Z" fill="#4A90E2" opacity="0.2"/>
          <path d="M310 210 L330 210 L328 215 L312 215 Z" fill="#4A90E2" opacity="0.2"/>
          <rect x="145" y="210" width="190" height="4" rx="2" fill="#D4D4D4"/>

          <!-- Book stack (left) -->
          <rect x="100" y="185" width="50" height="10" rx="2" fill="#4A90E2" opacity="0.7"/>
          <rect x="105" y="175" width="50" height="10" rx="2" fill="#3A0CA3" opacity="0.5"/>
          <rect x="102" y="165" width="50" height="10" rx="2" fill="#6FCF97" opacity="0.6"/>

          <!-- Coffee cup (right) -->
          <rect x="345" y="185" width="25" height="25" rx="4" fill="#fff" stroke="#D4D4D4" stroke-width="1.5"/>
          <path d="M370 192 Q378 192 378 198 Q378 204 370 204" stroke="#D4D4D4" stroke-width="1.5" fill="none"/>
          <!-- Steam -->
          <path d="M352 182 Q354 176 356 180" stroke="#D4D4D4" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
          <path d="M358 180 Q360 174 362 178" stroke="#D4D4D4" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>

          <!-- Pencil -->
          <rect x="376" y="170" width="6" height="40" rx="2" fill="#FFBD2E" transform="rotate(15, 379, 190)"/>
          <polygon points="376,210 379,218 382,210" fill="#F5C6A0" transform="rotate(15, 379, 214)"/>

          <!-- Calendar icon (floating, top-left) -->
          <rect x="90" y="80" width="44" height="44" rx="10" fill="#fff" stroke="#4A90E2" stroke-width="1.5"/>
          <rect x="90" y="80" width="44" height="14" rx="10" fill="#4A90E2" opacity="0.15"/>
          <circle cx="103" cy="103" r="2.5" fill="#C0392B"/>
          <circle cx="112" cy="103" r="2.5" fill="#4A90E2"/>
          <circle cx="121" cy="103" r="2.5" fill="#6FCF97"/>
          <circle cx="103" cy="114" r="2.5" fill="#E0E0E0"/>
          <circle cx="112" cy="114" r="2.5" fill="#E0E0E0"/>
          <circle cx="121" cy="114" r="2.5" fill="#4A90E2" opacity="0.3"/>

          <!-- Checkmark icon (floating, top-right) -->
          <rect x="350" y="70" width="44" height="44" rx="10" fill="#fff" stroke="#6FCF97" stroke-width="1.5"/>
          <circle cx="372" cy="92" r="12" fill="#6FCF97" opacity="0.15"/>
          <path d="M365 92 L370 97 L380 87" stroke="#6FCF97" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

          <!-- Chart icon (floating, right) -->
          <rect x="370" y="135" width="44" height="44" rx="10" fill="#fff" stroke="#3A0CA3" stroke-width="1.5"/>
          <rect x="381" y="163" width="6" height="8" rx="1.5" fill="#3A0CA3" opacity="0.4"/>
          <rect x="389" y="155" width="6" height="16" rx="1.5" fill="#3A0CA3" opacity="0.6"/>
          <rect x="397" y="148" width="6" height="23" rx="1.5" fill="#3A0CA3" opacity="0.8"/>

          <!-- Decorative dots -->
          <circle cx="70" cy="150" r="4" fill="#4A90E2" opacity="0.15"/>
          <circle cx="60" cy="165" r="3" fill="#6FCF97" opacity="0.2"/>
          <circle cx="415" cy="200" r="4" fill="#3A0CA3" opacity="0.12"/>
          <circle cx="425" cy="185" r="3" fill="#C0392B" opacity="0.15"/>
        </svg>
      </div>

      <!-- Primary CTA -->
      <div class="w-full mt-8" style="max-width: 580px;">
        <a href="onboarding-2.html" class="btn btn--primary btn--large btn--full">Get Started</a>
      </div>


    </main>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer__text">&copy; 2024 MyPace Academic Systems</p>
      <p class="footer__version">v1.0.0</p>
    </footer>

  </div>
</body>
</html>
